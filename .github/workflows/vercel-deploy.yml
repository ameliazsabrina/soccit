name: Deploy to Vercel

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Select deployment environment
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "environment=production" >> "${GITHUB_OUTPUT}"
            echo "production_flag=--prod" >> "${GITHUB_OUTPUT}"
          else
            echo "environment=preview" >> "${GITHUB_OUTPUT}"
            echo "production_flag=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Pull Vercel project settings
        run: >-
          vercel pull --yes
          --environment=${{ steps.target.outputs.environment }}
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build deployment artifacts
        run: >-
          vercel build
          ${{ steps.target.outputs.production_flag }}
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts
        id: deploy
        shell: bash
        run: |
          vercel deploy --prebuilt ${{ steps.target.outputs.production_flag }} --token=${{ secrets.VERCEL_TOKEN }} | tee deployment-url.txt
          echo "url=$(tail -n 1 deployment-url.txt)" >> "${GITHUB_OUTPUT}"

      - name: Add deployment URL to summary
        shell: bash
        run: |
          echo "### Vercel ${{ steps.target.outputs.environment }} deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.deploy.outputs.url }}" >> "${GITHUB_STEP_SUMMARY}"
