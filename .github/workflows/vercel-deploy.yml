name: Deploy landing to Vercel

on:
  push:
    branches:
      - feat/landing-page
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-landing-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_zeNMUx9oY2xvQAGhMkOAfrCy
  VERCEL_PROJECT_ID: prj_M9tlyfEzgBte2SDkmELmumI2dwt6

jobs:
  deploy:
    name: Deploy landing production
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: >-
          vercel pull --yes
          --environment=production
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build deployment artifacts
        run: >-
          vercel build --prod
          --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts
        id: deploy
        shell: bash
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tee deployment-url.txt
          echo "url=$(tail -n 1 deployment-url.txt)" >> "${GITHUB_OUTPUT}"

      - name: Add deployment URL to summary
        shell: bash
        run: |
          echo "### Vercel landing production deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.deploy.outputs.url }}" >> "${GITHUB_STEP_SUMMARY}"
